      - paragraph [ref=e108]: 羅倫斯是跑遍各地的旅行商人，他壓根兒就不相信教會的教誨。不過，說起迷信或信仰的程度，可是在農夫們之上。畢竟在他辛苦翻越山頭，好不容易來到城鎮時，卻發現商品價值暴跌的事情屢見不鮮，也難怪他會變得迷信或執著於信仰了。
      - paragraph [ref=e109]: 因此，對於熱忱信徒或教會相關人士特別關注的這些儀式，羅倫斯一點也不在意。
      - paragraph: 「不過，我也因此拿到上等的皮草啊，我會再來的。」
      - paragraph [ref=e110]: 不過，關於葉勒成為赫蘿這件事，倒是讓羅倫斯感到有些困擾。這麼一來，在祭典結束以前，葉勒會被關在有準備佳肴的穀倉里整整一個星期，根本沒法與他說話。
      - paragraph [ref=e111]: 「算了……」
      - paragraph [ref=e112]: 羅倫斯嘆了口氣，坐回馬車，朝村長的住處前去。
      - paragraph [ref=e113]: 羅倫斯原本打算跟葉勒聊聊修道院發生的事，順便與他小酌幾杯。但是如果不趕緊把堆在貨台上的貂皮變賣成現金，就來不及支付在其他地方採買商品的貨款。再加上羅倫斯想要早些賣掉從深山村落帶下山的麥子，所以他不能一直等到祭典結束。
      - paragraph [ref=e114]: 羅倫斯向忙著指揮祭典準備工作的村長，簡單說明中午發生的事情後，推辭村長要他留下來過夜的邀請，離開村落。
      - paragraph [ref=e115]: 從前，當現在的伯爵還沒來到這塊領土以前，高額的稅金使得這裡的麥子價格高漲，在市場上變得不受歡迎。那時羅倫斯曾買下這裡的麥子，靠著微薄的利潤勤懇地銷售。羅倫斯這麼做並非為了施捨恩惠給這裡的居民，單純只是因為他沒有雄厚的資金，能夠與其他商人競爭購買便宜又受歡迎的麥子。因為當時的事，葉勒至今仍然對羅倫斯抱著感恩之心。葉勒是當時村裡負責交涉價格的人。
      - paragraph [ref=e116]: 雖然不能和葉勒喝上幾杯十分遺憾，但不管怎樣，只要赫蘿一出現，沒多久村民就會趕走外人，好讓祭典進入最高潮。即使留下來過夜，也只會落得被趕走的命運。這股疏離感，著著實實讓獨自坐在馬車上的羅倫斯，心裡覺得陣陣寂寥。
      - paragraph [ref=e117]: 羅倫斯咬著村民送他的蔬菜，往西方出發。與剛完成田裡的工作，開心地朝村落歸去的農夫們擦肩而過。
      - paragraph [ref=e118]: 羅倫斯再度踏上一個人的旅途，不禁羨慕起那些有同伴的農夫們。
      - paragraph: 成束的麥子就放在貂皮堆旁邊，那是羅倫斯前去賣鹽的村落所種植的麥子。那裡的麥子不但耐寒，也不容易被蟲咬。去年西北方受到嚴重的寒害，羅倫斯打算把麥子拿到西北方去賣。
      - paragraph: 羅倫斯嘆了口氣，坐回馬車，朝村長的住處前去。
      - paragraph [ref=e119]: 今年滿二十五歲的羅倫斯是一名旅行商人。他在十二歲時開始跟隨旅行商人親戚學習，到了十八歲便自立門戶。身為一名旅行商人，羅倫斯還有很多不曾去過的地方，對他來說，接下來的日子才是真正的考驗。
      - paragraph [ref=e120]: 羅倫斯也有著旅行商人都會懷抱的美夢，那就是累積積蓄後，在某個城鎮擁有一間商店。然而，距離美夢成真的那一天依舊遙遠。如果能夠碰上什麼好機會，要實現美夢或許不難，可惜那樣的好機會都被大商人用錢買走了。
      - paragraph [ref=e121]: 況且羅倫斯還常因為別人拖欠貨款，而必須載著堆滿馬車的貨物四處奔走。就算髮現好機會，恐怕也沒有餘力去抓住。對旅行商人來說，好機會就像高掛夜空的月亮一樣，遙不可及。
      - paragraph [ref=e122]: 羅倫斯抬頭仰望天空，對皎潔的滿月嘆氣。羅倫斯雖然有察覺自己近來嘆氣的次數增多，但不知道這是自己為了生存而過度打拚所產生的反彈，還是因為生意比較上軌道，所以最近老是思考到未來的事造成的。
      - paragraph: 「異教徒祭典……還真會猜啊。」
      - paragraph [ref=e123]: 以往羅倫斯的腦袋裡，想得儘是應收款項的債權及付款期限，他總是拚命想儘早趕到下一個城鎮。那時根本沒有餘力去思考的事情，現在卻經常浮現在腦海里。
      - paragraph [ref=e124]: 具體來說，羅倫斯在想一路上所認識的人們。
      - paragraph: 「嗨！辛苦了。」
      - paragraph [ref=e125]: 每次行商都會前往的城鎮所混熟的商人們、或是採買地區熟識的村民們、還有因大雪困住而久留旅館時喜歡上的女子等等。
      - paragraph [ref=e126]: 也就是說，羅倫斯希望有人陪伴的感覺增強了。
      - paragraph [ref=e127]: 對於整年都一個人在馬車上度過的旅行商人來說，希望有人陪伴的毛病可算是一種職業病。但羅倫斯是到了最近，才開始有這樣的感覺。在這之前，羅倫斯總是誇口說：「這種事不可能發生在我身上。」
