      - paragraph [ref=e14]: 結束一如往常的對話，離開深山裡的村落已過了五個小時。太陽升起後就立刻動身，下山來到這片草原時已過了中午。
      - paragraph: 具體來說，羅倫斯在想一路上所認識的人們。
      - paragraph [ref=e15]: 這天的天氣晴朗，沒有半點風，是個適合坐在馬車上，悠哉橫越草原的日子。因為這陣子的天氣寒冷，原以為冬天就快到了，現在卻一點兒也感覺不到。
      - paragraph: 「是葉勒！葉勒！葉勒！」
      - paragraph [ref=e16]: 成為自力更生的旅行商人，隻身行商至今已有七個年頭，今年二十五歲的羅倫斯坐在馬車駕座上，泰然自若地打著呵欠。
      - paragraph [ref=e17]: 這裡幾乎沒有高大的草木會阻礙視線，眼前景色一望無際，也因此可以看清遠方的景象。在視野最遠處，可看到一所幾年前建蓋好的修道院。
      - paragraph [ref=e18]: 或許是有某地方的貴族子弟成了他們的修道士吧，儘管在如此偏僻荒遠的土地上，但這所修道院不僅是一棟優良的石造建築物，甚至還使用了鐵制門窗，令人難以置信。記得沒錯的話，修道院里應該有二十多位修道士，另外還有將近同樣人數的男僕為他們打點生活。
      - paragraph [ref=e19]: 修道院剛開始建蓋時，羅倫斯以為可以招攬到新顧客而滿懷期待。可惜修道院似乎不跟民間商人往來，而是以獨自的通路調度物資，羅倫斯的期望因而落空。
      - paragraph [ref=e20]: 雖然期望是落了空，但是修道士的生活並不奢侈，他們甚至會下田耕作；就算做成了生意，可能也沒有太多利益可圖。不僅如此，或許還有可能被迫捐款，或者被倒債。
      - paragraph [ref=e21]: 單純就買賣的對象來說，修道士比盜賊還要惡劣。不過，只要能夠和他們做生意，對商人來說還是有好處。
      - paragraph [ref=e22]: 因為這個緣故，羅倫斯還是戀戀不捨地望著修道院，但是他突然眯起眼睛。
      - paragraph [ref=e23]: 修道院那頭，有人正朝向這邊揮手。
      - paragraph [ref=e24]: 「怎麼回事？」
      - paragraph [ref=e25]: 那人看起來不像男僕，因為男僕身上穿的應該是骯髒的深褐色工作服，而正在揮手的人穿著看似灰色的衣服。雖然要特地走到那頭有些麻煩，但就這麼漠視的話，恐怕會造成日後的困擾。羅倫斯不得已，只好把馬車轉向修道院的方向。
      - paragraph [ref=e26]: 馬車轉向後，原本揮著手的人可能是發現羅倫斯朝自己的方向走來，便停止揮手，但也沒有走向羅倫斯的意思。看來，他要等羅倫斯自己走到修道院。教會相關人士的態度傲慢已是司空見慣的事，羅倫斯不會為了這點小事生氣。
      - paragraph [ref=e27]: 不過，在緩緩靠近修道院，清楚看見那人的身影后，羅倫斯不禁發出聲音說：
      - paragraph [ref=e28]: 「……騎士？」
      - paragraph [ref=e29]: 起初羅倫斯心想：騎士怎麼可能會出現在這裡？但靠近後他發現確實是名騎士，原來看起來灰灰的衣服是銀色的盔甲。
      - paragraph [ref=e30]: 「你是什麼人？」
      - paragraph [ref=e31]: 騎士在羅倫斯到了兩人要交談還稍嫌遠的距離時，便如此大喊。那語氣彷彿自己不用報上名來，每個人也該認得他似的。
      - paragraph: 「請問葉勒在哪裡啊？」
      - paragraph [ref=e32]: 「我是旅行商人羅倫斯，有什麼能為您效勞的嗎？」
      - paragraph [ref=e33]: 修道院已近在眼前，往南方延伸的田地里，正在耕作的男僕寥寥可數。
      - paragraph [ref=e34]: 羅倫斯發現騎士不止一名，還有一名騎士站在修道院另一頭，說不定騎士們是在站崗巡視。
      - paragraph [ref=e35]: 「旅行商人？你來的方嚮應該沒有任何城鎮。」
      - paragraph [ref=e36]: 騎士驕傲地挺起刻有紅色十字架的銀制胸甲，態度蠻橫地說道。
      - paragraph [ref=e37]: 然而，騎士直接套在肩上的大衣同樣是灰色，這代表他只是一名下級騎士。短短的金髮似乎剛剃不久，體格也看不出身經百戰的樣子。或許是剛剛成為騎士，所以顯得趾高氣揚。面對這種人，必須從容應付，免得他們一下子就得意忘形。
      - paragraph [ref=e38]: 羅倫斯沒有馬上回答，他從懷裡拿出一隻皮袋，緩緩解開綁住袋口的繩子，袋子里裝著蜂蜜糖。羅倫斯拿出一顆放入口中，再把整袋蜂蜜糖遞給騎士。
      - paragraph: 羅倫斯從馬車上走下，探頭往人牆的另一邊望去，正好看見葉勒抓住最後一束麥子。葉勒沾滿泥土和汗水的黑臉露出苦笑，他一口氣割下麥子後，舉高整束麥子，朝著天空大喊：
