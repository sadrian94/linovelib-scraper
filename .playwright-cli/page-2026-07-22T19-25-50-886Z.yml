      - paragraph [ref=e69]: 但是，這附近的祭典比其他地方盛大且特別，所以修道院的人可能因此特別向城裡的教會提出報告。或許是長久以來，這地方從不曾正式納入教會的版圖，所以教會才顯得特別敏感。
      - paragraph [ref=e70]: 再說，教會近來熱衷異端（註：指非正統的宗教派別）審判及異教徒改教活動，最近也常聽說城裡的神學者與自然學者發生言論鬥爭的消息。民眾已漸漸不像從前那樣，無條件服從教會。
